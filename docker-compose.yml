services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_development
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://app:password@db:5432/app_development
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - bundle_data:/bundle
    depends_on:
      - db

volumes:
  db_data:
  bundle_data: